name: 'Setup Windows Dependencies'
description: 'Set up Windows dependencies for GitHub Actions.'

branding:
  icon: 'grid'
  color: 'blue'

runs:
  using: 'composite'
  steps:
    - name: Run Setup Script
      shell: bash
      run: |
        chmod +x ${{ github.action_path }}/setup-windows.sh
        ${{ github.action_path }}/setup-windows.sh
      env:
        GITHUB_TOKEN: ${{ github.token }}
